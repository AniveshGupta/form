<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="utf-8">
    <title>BBDU Registration Form</title>
</head>
<body>

    <div class = "container">

<h3>BBDU Registration Form</h3>

<form action="#">
    <label for="firstName">First Name:</label>
    <input type="text" placeholder="Enter your first name"><br><br>

    <label for="lastName">Last Name:</label>
    <input type="text" placeholder="Enter your last name"><br><br>

    <label for="rollNo">Roll No:</label>
    <input type="text" placeholder="Enter your roll number"><br><br>

    <label for="phoneNo">Phone No:</label>
    <input type="tel" placeholder="Enter your phone number"><br><br>

    <label for="address">Address:</label>
    <input type="text" placeholder="Enter your address"><br><br>

    <label for="email">Email:</label>
    <input type="email" placeholder="Enter your email"><br><br>

    <label for="password">Password:</label>
    <input type="password" placeholder="Enter your password"><br><br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
</form>
</div>
</body>
</html>
